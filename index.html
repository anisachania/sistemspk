<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SPK Pemilihan Toko Pashmina Terbaik</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

    <style>

        :root{
            --bg:#fefce8;
            --primary:#fde047;
            --secondary:#6366f1;
            --accent:#ec4899;
            --text:#000;
            --border:3px;
            --shadow:6px 6px 0 #000;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Space Grotesk',sans-serif;
        }

        body{
            background:var(--bg);
            color:var(--text);
            padding:2rem;
        }

        .container{
            max-width:1200px;
            margin:auto;
        }

        .card{
            background:#fff;
            border:var(--border) solid #000;
            border-radius:16px;
            padding:2rem;
            margin-bottom:2rem;
            box-shadow:var(--shadow);
        }

        h1{
            font-size:3rem;
            font-weight:800;
            margin-bottom:1rem;
        }

        .section-title{
            background:var(--primary);
            display:inline-block;
            padding:.5rem 1rem;
            border:3px solid #000;
            margin-bottom:1.5rem;
            font-size:1.5rem;
            font-weight:800;
        }

        button{
            padding:1rem 1.5rem;
            background:var(--primary);
            border:3px solid #000;
            border-radius:10px;
            font-weight:700;
            cursor:pointer;
            box-shadow:4px 4px 0 #000;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:1rem;
        }

        th,td{
            border:2px solid #000;
            padding:1rem;
            text-align:center;
        }

        th{
            background:var(--primary);
        }

        .rank-item{
            display:flex;
            justify-content:space-between;
            padding:1rem;
            border:2px solid #000;
            margin-bottom:.8rem;
            border-radius:10px;
            background:#fff;
        }

        .top{
            background:var(--primary);
        }

        .info-box{
            margin-top:1rem;
            background:#dbeafe;
            border:2px solid #000;
            padding:1rem;
            border-radius:10px;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
            gap:2rem;
        }

        canvas{
            background:#fff;
            border:3px solid #000;
            padding:1rem;
            border-radius:16px;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="card">
        <h1>SPK Pemilihan Toko Pashmina</h1>
        <p>Menggunakan Metode AHP, SAW, WP, dan SMART</p>
    </div>

    <div class="card">

        <h2 class="section-title">Mulai Analisis</h2>

        <button onclick="calculateAll()">
            ANALISIS SEKARANG
        </button>

    </div>

    <div id="results" style="display:none;">

        <!-- AHP -->

        <div class="card">

            <h2 class="section-title">
                AHP - Bobot Kriteria
            </h2>

            <table>
                <thead>
                    <tr>
                        <th>Kriteria</th>
                        <th>C1</th>
                        <th>C2</th>
                        <th>C3</th>
                        <th>C4</th>
                    </tr>
                </thead>

                <tbody id="ahpBody"></tbody>
            </table>

            <div id="ahpResult"></div>

        </div>

        <!-- DATA -->

        <div class="card">

            <h2 class="section-title">
                Data Alternatif
            </h2>

            <table>

                <thead>
                    <tr>
                        <th>Nama Toko</th>
                        <th>Rating</th>
                        <th>Kualitas</th>
                        <th>Harga</th>
                        <th>Penjualan</th>
                    </tr>
                </thead>

                <tbody id="altBody"></tbody>

            </table>

        </div>

        <!-- RANKING -->

        <div class="card">

            <h2 class="section-title">
                Ranking Hasil
            </h2>

            <div class="grid">

                <div>
                    <h3>🏆 SAW</h3>
                    <div id="sawRank"></div>
                </div>

                <div>
                    <h3>🏆 WP</h3>
                    <div id="wpRank"></div>
                </div>

                <div>
                    <h3>🏆 SMART</h3>
                    <div id="smartRank"></div>
                </div>

            </div>

        </div>

        <!-- CHART -->

        <div class="card">

            <h2 class="section-title">
                Grafik Perbandingan
            </h2>

            <canvas id="chart"></canvas>

        </div>

    </div>

</div>

<script>

lucide.createIcons();

let criteriaWeights = [];

const criteriaTypes = [
    'benefit',
    'benefit',
    'cost',
    'benefit'
];

const shopeeData = [

    { name:"by.nvilda", values:[4.9,95,45000,15000] },
    { name:"Kaniya", values:[4.8,88,35000,12000] },
    { name:"WMD Fashion", values:[4.7,85,28000,20000] },
    { name:"Orbelle Store", values:[4.8,92,55000,8000] },
    { name:"Lozy Hijab", values:[4.9,98,75000,18000] },
    { name:"Rifany Hijab", values:[4.7,84,25000,50000] },
    { name:"Demar Hijab", values:[4.8,90,42000,11000] },
    { name:"Tiebymin", values:[4.9,94,65000,9000] }

];

function calculateAHP(){

    const matrix = [

        [1,2,3,4],
        [0.5,1,2,3],
        [0.33,0.5,1,2],
        [0.25,0.33,0.5,1]

    ];

    document.getElementById("ahpBody").innerHTML =

        matrix.map((row,i)=>`

            <tr>

                <td><b>C${i+1}</b></td>

                ${row.map(v=>`<td>${v}</td>`).join('')}

            </tr>

        `).join('');

    let n = matrix.length;

    let colSum = [];

    for(let j=0;j<n;j++){

        let sum = 0;

        for(let i=0;i<n;i++){

            sum += matrix[i][j];

        }

        colSum.push(sum);

    }

    let normalized = [];

    for(let i=0;i<n;i++){

        normalized[i] = [];

        for(let j=0;j<n;j++){

            normalized[i][j] = matrix[i][j] / colSum[j];

        }

    }

    let weights = [];

    for(let i=0;i<n;i++){

        let total = 0;

        for(let j=0;j<n;j++){

            total += normalized[i][j];

        }

        weights[i] = total / n;

    }

    criteriaWeights = weights;

    let weightedSum = [];

    for(let i=0;i<n;i++){

        let total = 0;

        for(let j=0;j<n;j++){

            total += matrix[i][j] * weights[j];

        }

        weightedSum.push(total);

    }

    let lambdaMax = 0;

    for(let i=0;i<n;i++){

        lambdaMax += weightedSum[i] / weights[i];

    }

    lambdaMax = lambdaMax / n;

    let CI = (lambdaMax - n) / (n - 1);

    let RI = 0.90;

    let CR = CI / RI;

    document.getElementById("ahpResult").innerHTML = `

        <div class="info-box">

            <h3>Bobot Prioritas</h3>

            <p><b>C1 Rating</b> = ${weights[0].toFixed(3)}</p>
            <p><b>C2 Kualitas</b> = ${weights[1].toFixed(3)}</p>
            <p><b>C3 Harga</b> = ${weights[2].toFixed(3)}</p>
            <p><b>C4 Penjualan</b> = ${weights[3].toFixed(3)}</p>

            <hr style="margin:1rem 0;">

            <p><b>Consistency Ratio</b> = ${CR.toFixed(3)}</p>

            <p style="font-weight:bold; color:${CR < 0.1 ? 'green':'red'};">
                ${CR < 0.1 ? 'Konsisten':'Tidak Konsisten'}
            </p>

        </div>

    `;

}

function calculateAll(){

    document.getElementById("results").style.display = "block";

    calculateAHP();

    const alternatives = JSON.parse(JSON.stringify(shopeeData));

    document.getElementById("altBody").innerHTML =

        alternatives.map(a=>`

            <tr>

                <td>${a.name}</td>
                <td>${a.values[0]}</td>
                <td>${a.values[1]}</td>
                <td>${a.values[2]}</td>
                <td>${a.values[3]}</td>

            </tr>

        `).join('');

    const matrix = alternatives.map(a=>a.values);

    const maxVals = [];
    const minVals = [];

    for(let j=0;j<4;j++){

        const col = matrix.map(r=>r[j]);

        maxVals[j] = Math.max(...col);
        minVals[j] = Math.min(...col);

    }

    // SAW

    const saw = alternatives.map(a=>{

        const norm = a.values.map((v,j)=>

            criteriaTypes[j] == 'benefit'
            ? v / maxVals[j]
            : minVals[j] / v

        );

        const score = norm.reduce((s,v,j)=>

            s + (v * criteriaWeights[j])

        ,0);

        return {

            name:a.name,
            score

        };

    });

    // WP

    const wpTemp = alternatives.map(a=>{

        const s = a.values.reduce((p,v,j)=>

            p * Math.pow(

                v,

                criteriaTypes[j]=='benefit'
                ? criteriaWeights[j]
                : -criteriaWeights[j]

            )

        ,1);

        return {

            name:a.name,
            s

        };

    });

    const totalS = wpTemp.reduce((s,v)=>s+v.s,0);

    const wp = wpTemp.map(v=>({
        name:v.name,
        score:v.s / totalS
    }));

    // SMART

    const smart = alternatives.map(a=>{

        const util = a.values.map((v,j)=>{

            const range = maxVals[j] - minVals[j];

            if(criteriaTypes[j]=='benefit'){

                return (v - minVals[j]) / range;

            }else{

                return (maxVals[j] - v) / range;

            }

        });

        const score = util.reduce((s,v,j)=>

            s + (v * criteriaWeights[j])

        ,0);

        return {

            name:a.name,
            score

        };

    });

    renderRanking("sawRank", saw);
    renderRanking("wpRank", wp);
    renderRanking("smartRank", smart);

    renderChart(saw, wp, smart);

}

function renderRanking(id,data){

    const sorted = [...data].sort((a,b)=>b.score-a.score);

    document.getElementById(id).innerHTML =

        sorted.map((v,i)=>`

            <div class="rank-item ${i==0?'top':''}">

                <span>
                    ${i+1}. ${v.name}
                </span>

                <b>${v.score.toFixed(4)}</b>

            </div>

        `).join('');

}

let chartInstance;

function renderChart(saw,wp,smart){

    const ctx = document.getElementById("chart");

    if(chartInstance){

        chartInstance.destroy();

    }

    chartInstance = new Chart(ctx,{

        type:'bar',

        data:{

            labels:shopeeData.map(v=>v.name),

            datasets:[

                {
                    label:'SAW',
                    data:saw.map(v=>v.score),
                    backgroundColor:'#fde047'
                },

                {
                    label:'WP',
                    data:wp.map(v=>v.score),
                    backgroundColor:'#6366f1'
                },

                {
                    label:'SMART',
                    data:smart.map(v=>v.score),
                    backgroundColor:'#ec4899'
                }

            ]

        },

        options:{

            responsive:true

        }

    });

}

</script>

</body>
</html>
